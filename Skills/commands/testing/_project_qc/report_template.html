<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>網站校稿單</title>
<style>
  :root {
    --pass: #27ae60; --ng: #e74c3c; --warn: #f39c12; --pending: #8e44ad;
    --bg: #f8f9fa; --card: #fff; --border: #dee2e6; --text: #212529;
    --header-bg: #1a3c5e; --header-fg: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  h1 { background: var(--header-bg); color: var(--header-fg); padding: 24px 32px; margin: -20px -20px 24px; }
  h1 small { display: block; font-size: 14px; font-weight: 400; opacity: .8; margin-top: 6px; }
  h2 { color: var(--header-bg); border-bottom: 3px solid var(--header-bg); padding-bottom: 8px; margin: 32px 0 16px; }
  h3 { color: #34495e; margin: 20px 0 10px; }

  .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .meta-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; }
  .meta-card dt { font-size: 12px; color: #888; text-transform: uppercase; }
  .meta-card dd { font-size: 15px; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; margin: 12px 0 20px; background: var(--card); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  th { background: #eef2f7; font-weight: 600; text-align: left; padding: 10px 14px; font-size: 13px; white-space: nowrap; }
  td { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 14px; vertical-align: top; }
  tr:hover td { background: #f0f4f8; }

  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; color: #fff; }
  .badge-pass { background: var(--pass); }
  .badge-ng { background: var(--ng); }
  .badge-warn { background: var(--warn); }
  .badge-pending { background: var(--pending); }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin: 16px 0 24px; }
  .summary-card { background: var(--card); border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,.06); border-left: 5px solid var(--pass); }
  .summary-card.has-ng { border-left-color: var(--ng); }
  .summary-card .num { font-size: 36px; font-weight: 800; }
  .summary-card .num.green { color: var(--pass); }
  .summary-card .num.red { color: var(--ng); }
  .summary-card .label { font-size: 13px; color: #888; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin: 14px 0; }
  .card.ng { border-left: 4px solid var(--ng); }
  .card.pass { border-left: 4px solid var(--pass); }
  .card.warn { border-left: 4px solid var(--warn); }

  .version-track { background: #eef2f7; border-radius: 8px; padding: 16px; margin: 16px 0; }
  .version-track table { box-shadow: none; }

  .screenshot { max-width: 100%; height: auto; border: 1px solid var(--border); border-radius: 6px; margin: 6px 0; cursor: pointer; transition: transform .2s; }
  .screenshot:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(0,0,0,.15); }

  .compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 12px 0; align-items: start; }
  .compare-col { text-align: center; }
  .compare-col img { max-width: 100%; }
  .compare-col .cap { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }

  .toc { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px 24px; margin: 16px 0; }
  .toc a { color: var(--header-bg); text-decoration: none; display: block; padding: 4px 0; }
  .toc a:hover { text-decoration: underline; }

  /* Lightbox */
  .lightbox-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.85); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out; }
  .lightbox-overlay.active { display: flex; }
  .lightbox-overlay img { max-width: 95%; max-height: 95%; object-fit: contain; }

  @media print { body { background: #fff; } .container { max-width: 100%; } }
  @media (max-width: 768px) { .compare-row { grid-template-columns: 1fr; } }

  /* 載入中 */
  #loading { text-align: center; padding: 60px 20px; color: #888; }
  #loading .spinner { border: 4px solid #eee; border-top: 4px solid var(--header-bg); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="lightbox-overlay" id="lightbox" onclick="this.classList.remove('active')">
  <img id="lightbox-img" src="" alt="zoom">
</div>

<div class="container" id="app">
  <div id="loading">
    <div class="spinner"></div>
    <p>載入校稿單資料...</p>
    <p style="font-size:13px;margin-top:10px;">請確認同目錄下有 <code>qc_report.json</code></p>
  </div>
</div>

<script>
// ===== 校稿單 JSON 渲染器 =====
// 讀取同目錄下的 qc_report.json 並渲染成完整校稿單

(async function() {
  const app = document.getElementById('app');

  // 載入 JSON
  let data;
  try {
    const resp = await fetch('qc_report.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
  } catch(e) {
    app.innerHTML = `<h1>載入失敗</h1><p>無法讀取 <code>qc_report.json</code>：${e.message}</p>
      <p>請確認 JSON 檔案與此 HTML 在同一目錄。</p>`;
    return;
  }

  const m = data.meta;
  const s = data.summary;
  document.title = `${m.projectName} 網站校稿單 v${m.version}`;

  // Helper: badge
  function badge(type, text) {
    return `<span class="badge badge-${type}">${text}</span>`;
  }
  function resultBadge(result) {
    if (!result) return '';
    const r = String(result).toUpperCase();
    if (r === 'PASS' || r.includes('%')) return badge('pass', result);
    if (r === 'NG' || r === 'FAIL') return badge('ng', result);
    if (r === 'WARN') return badge('warn', result);
    return badge('pending', result);
  }
  function severityBadge(sev) {
    const map = { 'NG': 'ng', 'WARN': 'warn', 'INFO': 'pending', 'MEDIUM': 'warn' };
    return badge(map[sev] || 'ng', sev);
  }

  // ===== 渲染 =====
  let html = '';

  // Header
  html += `<h1>${m.projectName} — 網站校稿單
    <small>稽核日期：${m.date} ｜ 版次：v${m.version} ｜ 環境：${m.environment}</small>
  </h1>`;

  // Meta
  html += `<div class="meta-grid">
    <div class="meta-card"><dt>UI/UX 稽核員</dt><dd>${m.auditors.uiux}</dd></div>
    <div class="meta-card"><dt>邏輯稽核員</dt><dd>${m.auditors.logic}</dd></div>
    <div class="meta-card"><dt>前台</dt><dd>${m.frontendUrl}</dd></div>
    <div class="meta-card"><dt>後台</dt><dd>${m.backendUrl}</dd></div>
    ${m.xdUrl ? `<div class="meta-card"><dt>XD 設計稿</dt><dd><a href="${m.xdUrl}" target="_blank">Adobe XD</a></dd></div>` : ''}
    ${m.specUrl ? `<div class="meta-card"><dt>規格書</dt><dd><a href="${m.specUrl}" target="_blank">AxShare</a></dd></div>` : ''}
  </div>`;

  // TOC
  html += `<div class="toc"><strong>目錄</strong>
    <a href="#summary">整體結論 &amp; 統計</a>
    <a href="#version">版本追蹤 &amp; 已修正清單</a>
    <a href="#ng">仍存在的 NG 項目</a>
    ${data.phases.map(p => `<a href="#phase-${p.id}">Phase ${p.id} — ${p.name}</a>`).join('\n    ')}
  </div>`;

  // Summary
  html += `<h2 id="summary">整體結論</h2>`;
  html += `<div class="summary-grid">
    <div class="summary-card"><div class="num green">${s.pages}</div><div class="label">頁面掃描</div></div>
    <div class="summary-card"><div class="num green">${s.screenshots}</div><div class="label">截圖數</div></div>
    <div class="summary-card"><div class="num green">${s.modules}</div><div class="label">模組映射</div></div>
    <div class="summary-card"><div class="num green">${s.fixed}</div><div class="label">已修正</div></div>
    <div class="summary-card has-ng"><div class="num red">${s.ng}</div><div class="label">仍存在 NG</div></div>
    <div class="summary-card"><div class="num" style="color:var(--pending)">${s.techDebt}</div><div class="label">技術債</div></div>
  </div>`;

  // Phase summary table
  html += `<table><tr><th>Phase</th><th>負責人</th><th>結果</th><th>NG</th><th>說明</th></tr>`;
  const totalNg = data.phases.reduce((sum, p) => sum + (p.ng || 0), 0);
  data.phases.forEach(p => {
    html += `<tr><td>${p.id} ${p.name}</td><td>${p.owner}</td><td>${resultBadge(p.result)}</td><td>${p.ng}</td><td>${p.note || ''}</td></tr>`;
  });
  html += `<tr style="background:#eef2f7;font-weight:700"><td>總計</td><td>—</td><td></td><td style="color:var(--ng);font-size:18px">${totalNg}</td><td></td></tr></table>`;

  // Version History
  html += `<h2 id="version">版本追蹤 &amp; 已修正清單</h2>`;
  html += `<div class="version-track"><table><tr><th>版次</th><th>NG 數</th><th>變更</th></tr>`;
  data.versionHistory.forEach(v => {
    const isCurrent = v.version === m.version;
    const style = isCurrent ? ' style="font-weight:700"' : '';
    html += `<tr${style}><td>v${v.version}</td><td>${v.ng}</td><td>${v.changes}</td></tr>`;
  });
  html += `</table></div>`;

  // Fix list
  html += `<h3>已修正清單</h3><table><tr><th>#</th><th>原問題</th><th>修正方式</th><th>版次</th></tr>`;
  data.fixes.forEach(f => {
    html += `<tr><td>${badge('pass', f.id)}</td><td>${f.problem}</td><td>${f.fix}</td><td>v${f.version}</td></tr>`;
  });
  html += `</table>`;

  // NG Items
  html += `<h2 id="ng">仍存在的 NG 項目（${data.ngItems.length} 項）</h2>`;
  data.ngItems.forEach(item => {
    const cardClass = item.severity === 'NG' ? 'ng' : item.severity === 'WARN' ? 'warn' : 'pass';
    html += `<div class="card ${cardClass}">
      <h4>[${item.id}] ${item.title} ${severityBadge(item.severity)}</h4>
      <p>${item.description}</p>`;
    if (item.screenshots && (item.screenshots.xd || item.screenshots.live)) {
      html += `<div class="compare-row">`;
      if (item.screenshots.xd) html += `<div class="compare-col"><div class="cap">XD 設計稿</div><img class="screenshot" src="${item.screenshots.xd}" onclick="openLightbox(this.src)"></div>`;
      if (item.screenshots.live) html += `<div class="compare-col"><div class="cap">實際網站</div><img class="screenshot" src="${item.screenshots.live}" onclick="openLightbox(this.src)"></div>`;
      html += `</div>`;
    }
    html += `</div>`;
  });

  // Spec Coverage
  if (data.specCoverage) {
    html += `<h2>📋 規格書涵蓋率</h2>`;
    html += `<table><tr><th>規格書頁面</th><th>類型</th><th>對應測試</th><th>狀態</th></tr>`;
    data.specCoverage.forEach(item => {
      html += `<tr><td>${item.page}</td><td>${item.type}</td><td>${item.testRef}</td><td>${resultBadge(item.status)}</td></tr>`;
    });
    html += `</table>`;
  }

  // Tech Debt
  html += `<h3>技術債（非 NG，建議後續處理）</h3>`;
  html += `<table><tr><th>#</th><th>項目</th><th>說明</th></tr>`;
  data.techDebt.forEach(t => {
    html += `<tr><td>${t.id}</td><td>${t.title}</td><td>${t.note}</td></tr>`;
  });
  html += `</table>`;

  // Phase placeholders (各 Phase 詳細內容由 JSON 的 phaseDetails 擴充)
  if (data.phaseDetails) {
    Object.entries(data.phaseDetails).forEach(([phaseId, detail]) => {
      html += `<h2 id="phase-${phaseId}">Phase ${phaseId} — ${detail.title || ''}</h2>`;
      html += detail.html || '<p>（詳見 JSON phaseDetails）</p>';
    });
  }

  // Render
  app.innerHTML = html;
})();

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}
</script>
</body>
</html>
